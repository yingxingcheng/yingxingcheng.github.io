name: Monthly site rebuild

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of every month at 06:00 UTC
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch new publications from ORCID + CrossRef
        run: python3 update_publications.py

      - name: Regenerate HTML
        run: python3 generate_html.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content.json index.html index-zh.html
          git diff --staged --quiet || git commit -m "chore: auto-update publications and regenerate HTML [skip ci]"
          git push
